# vdirsyncer config for two-way iCloud calendar sync.
# Install to ~/.config/vdirsyncer/config
#
# The Apple app-specific password is NOT stored here — it's fetched from the
# system keyring (gnome-keyring) via secret-tool. See contrib/SYNC.md.
#
# Replace APPLE_ID_EMAIL below with your iCloud Apple ID (e.g. you@icloud.com).

[general]
status_path = "~/.local/state/vdirsyncer/status/"

[pair icloud]
a = "local"
b = "icloud_remote"
# Discover every calendar on both sides and pair them by name.
collections = ["from a", "from b"]
# On a genuine conflict, let the iCloud copy win (safer default).
conflict_resolution = "b wins"
metadata = ["displayname", "color"]

[storage local]
type = "filesystem"
# Each iCloud calendar becomes a subdirectory of this path.
# The app reads this whole tree; EventStore writes new events into the
# collection you configure as its writeDir.
path = "~/.local/share/calendar/"
fileext = ".ics"

[storage icloud_remote]
type = "caldav"
url = "https://caldav.icloud.com/"
username = "APPLE_ID_EMAIL"
# Password pulled from the keyring at sync time — never written to disk.
password.fetch = ["command", "secret-tool", "lookup", "service", "icloud-caldav", "account", "APPLE_ID_EMAIL"]
