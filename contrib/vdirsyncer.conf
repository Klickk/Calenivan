# vdirsyncer config for two-way Google Calendar sync.
# Install to ~/.config/vdirsyncer/config
#
# Google no longer allows CalDAV over basic auth / app passwords, so this uses
# vdirsyncer's native OAuth "google_calendar" backend.
#
# Paste your OAuth "Desktop app" client id/secret below. These are low-
# sensitivity for an installed app (Google treats them as non-confidential),
# but still `chmod 600 ~/.config/vdirsyncer/config` after editing. The real
# credential — the OAuth token — is written to token_file on first sync.
# See contrib/SYNC.md.

[general]
status_path = "~/.local/state/vdirsyncer/status/"

[pair google]
a = "local"
b = "google_remote"
# Discover every calendar on both sides and pair them by name.
collections = ["from a", "from b"]
# On a genuine conflict, let the Google copy win (safer default).
conflict_resolution = "b wins"
metadata = ["displayname", "color"]

[storage local]
type = "filesystem"
# Each Google calendar becomes a subdirectory of this path.
# The app reads this whole tree; EventStore writes new events into the
# collection you configure as its writeDir.
path = "~/.local/share/calendar/"
fileext = ".ics"

[storage google_remote]
type = "google_calendar"
# OAuth token cache — created on first `vdirsyncer discover`, refreshed after.
token_file = "~/.local/state/vdirsyncer/google_token"
client_id = "PASTE_CLIENT_ID_HERE"
client_secret = "PASTE_CLIENT_SECRET_HERE"
